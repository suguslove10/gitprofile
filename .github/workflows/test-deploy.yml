name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f index.html || (echo "❌ index.html missing" && exit 1)
          test -f style.css  || (echo "❌ style.css missing"  && exit 1)
          test -f script.js  || (echo "❌ script.js missing"  && exit 1)
          echo "✅ All required files present"

      - name: Check index.html has required meta tags
        run: |
          grep -q 'og:title'       index.html || (echo "❌ Missing og:title"       && exit 1)
          grep -q 'description'    index.html || (echo "❌ Missing meta description" && exit 1)
          grep -q 'viewport'       index.html || (echo "❌ Missing viewport meta"  && exit 1)
          echo "✅ SEO meta tags present"
